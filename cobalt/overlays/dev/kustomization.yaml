apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base
- namespace.yaml
- configmap.yaml
patches:
- path: ingress-patch.yaml
  target:
    kind: Ingress
    name: cobalt-ingress
- path: certificate-patch.yaml
  target:
    kind: Certificate
    name: cobalt-tls
- path: ingress-inline-patch.yaml
  target:
    kind: Ingress
    name: cobalt-inline-ingress
images:
- name: vatusa/cobalt
  newName: vatusa/cobalt
  newTag: 4585d0b79df300360240236da55afa21cf4f3f31
