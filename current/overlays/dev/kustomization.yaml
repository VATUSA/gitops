apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- namespace.yaml
- ../../base/api
- ../../base/www
- certificate.yaml
- api-ingress.yaml
- api-configmap.yaml
- www-ingress.yaml
- www-configmap.yaml
- eso-service-account.yaml
- eso-secret-store.yaml
- www-secrets-es.yaml
- api-secrets-es.yaml
patches:
- path: deployment-patch.yaml
  target:
    kind: Deployment
    name: www
- path: deployment-patch.yaml
