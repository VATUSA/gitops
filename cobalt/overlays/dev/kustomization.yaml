apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base
- namespace.yaml
- configmap.yaml
patches:
- path: ingress-patch.yaml
  target:
    kind: Ingress
    name: cobalt-ingress
- path: certificate-patch.yaml
  target:
    kind: Certificate
    name: cobalt-tls
- path: ingress-inline-patch.yaml
  target:
    kind: Ingress
    name: cobalt-inline-ingress
images:
- name: vatusa/cobalt
  newName: vatusa/cobalt
  newTag: d2c0c2c33dff347f95085d2b0fbea739094c1d49
