apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base
- namespace.yaml
- configmap.yaml
patches:
- path: ingress-patch.yaml
  target:
    kind: Ingress
    name: mithril-ingress
- path: certificate-patch.yaml
  target:
    kind: Certificate
    name: mithril-tls
- path: deployment-patch.yaml
  target:
    kind: Deployment
    name: mithril
images:
- name: vatusa/mithril
  newName: vatusa/mithril
  newTag: 6ebb87862ffb0a59d0357d1f5a367461dda5b4f7
