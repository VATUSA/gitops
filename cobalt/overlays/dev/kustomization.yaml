apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base
- namespace.yaml
- configmap.yaml
patches:
- path: ingress-patch.yaml
  target:
    kind: Ingress
    name: cobalt-ingress
- path: ingress-inline-patch.yaml
  target:
    kind: Ingress
    name: cobalt-inline-ingress
- path: certificate-patch.yaml
  target:
    kind: Certificate
    name: cobalt-tls
images:
- name: vatusa/cobalt
  newName: vatusa/cobalt
  newTag: d6f56fd119b59ed78102e17a63e7c99f23f38502
