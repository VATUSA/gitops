apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base
- namespace.yaml
- configmap.yaml
patches:
- path: ingress-patch.yaml
  target:
    kind: Ingress
    name: mithril-ingress
- path: certificate-patch.yaml
  target:
    kind: Certificate
    name: mithril-tls
images:
- name: vatusa/mithril
  newName: vatusa/mithril
  newTag: 090be30210d896c5a94e6964eef207087adff248
