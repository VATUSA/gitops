apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base
- namespace.yaml
- configmap.yaml
patches:
- path: ingress-patch.yaml
  target:
    kind: Ingress
    name: cobalt-ingress
- path: certificate-patch.yaml
  target:
    kind: Certificate
    name: cobalt-tls
- path: ingress-inline-patch.yaml
  target:
    kind: Ingress
    name: cobalt-inline-ingress
images:
- name: vatusa/cobalt
  newName: vatusa/cobalt
  newTag: 1a369fce7c690127c01f2004eb3688947a2d5bbe
