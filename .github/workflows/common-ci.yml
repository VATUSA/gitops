name: Common CI Workflow
on:
  workflow_call:
    inputs:
      image-name:
        required: true
        type: string
      relative-path:
        required: false
        type: string
jobs:
    build:
      runs-on: ubuntu-latest
      steps:
        # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
        - uses: actions/checkout@v2

        - name: Build Docker Image
          run: docker build . --file ${{ inputs.relative-path }}Dockerfile --tag vatusa/${{ inputs.image-name }} --target app

        - name: Log in to Docker Hub
          uses: docker/login-action@v1
          with:
            username: ${{ secrets.DOCKER_USERNAME }}
            password: ${{ secrets.DOCKER_PASSWORD }}

        - name: Push to Docker Hub (main)
          run: |
            docker tag vatusa/${{ inputs.image-name }} vatusa/${{ inputs.image-name }}:latest
            docker tag vatusa/${{ inputs.image-name }} vatusa/${{ inputs.image-name }}:${{ github.sha }}
            docker push vatusa/${{ inputs.image-name }}:latest
            docker push vatusa/${{ inputs.image-name }}:${{ github.sha }}
    

    deploy:
      name: Deploy to ArgoCD
      runs-on: ubuntu-latest
      needs: build
      steps:
        - name: Check out the repo
          uses: actions/checkout@v4
          with:
            repository: 'VATUSA/gitops'
            path: gitops
            token: ${{ secrets.G_TOKEN }}
        - name: Setup Kustomize
          uses: imranismail/setup-kustomize@v2
        - name: Update manifests (dev)
          run: |
            cd $GITHUB_WORKSPACE/gitops/${{ inputs.image-name }}/overlays/dev
            kustomize edit set image vatusa/${{ inputs.image-name }}=vatusa/${{ inputs.image-name }}:dev-${{ github.sha }}
        - name: Commit and push changes
          run: |
            cd $GITHUB_WORKSPACE/gitops
            git config --global user.email "vatusa6@vatusa.net"
            git config --global user.name "VATUSA6"
            git add .
            git commit -m "Update ${{ inputs.image-name }} image tag to ${{ github.sha }}"
        - name: Push to gitops repo
          run: |
            cd $GITHUB_WORKSPACE/gitops
            git push origin main
            
