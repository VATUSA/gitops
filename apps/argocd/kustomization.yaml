apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: argocd
namespace: argocd

# ArgoCD itself, adopted from the upstream non-HA install manifest.
# To upgrade: bump the single version tag below, review the rendered diff, then sync.
resources:
  - https://raw.githubusercontent.com/argoproj/argo-cd/v2.14.21/manifests/install.yaml

patches:
  # 1. Never manage argocd-secret. It is stateful/runtime-owned: admin password,
  #    server.secretkey (session/JWT signing key), the Dex GitHub OAuth client
  #    credentials, and the argocd.vatusa.dev TLS cert+key. Deleting it from the
  #    render means ArgoCD neither overwrites nor prunes the live Secret.
  - patch: |
      $patch: delete
      apiVersion: v1
      kind: Secret
      metadata:
        name: argocd-secret

  # 2. argocd-rbac-cm stays solely owned by apps/configs (base/argocd-rbac-cm.yaml).
  #    Drop the empty copy from the upstream manifest to avoid dual ownership /
  #    OutOfSync flapping between the two Applications.
  - patch: |
      $patch: delete
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: argocd-rbac-cm

  # 3. Server-side apply the three CRDs. The applicationsets CRD's last-applied
  #    annotation is already ~220KB and will cross the 262144-byte client-side
  #    apply limit in 3.x. SSA is set per-resource via annotation, never app-wide
  #    (an app-wide syncOption caused phantom OutOfSync here before — see git log).
  - patch: |
      apiVersion: apiextensions.k8s.io/v1
      kind: CustomResourceDefinition
      metadata:
        name: applications.argoproj.io
        annotations:
          argocd.argoproj.io/sync-options: ServerSideApply=true
  - patch: |
      apiVersion: apiextensions.k8s.io/v1
      kind: CustomResourceDefinition
      metadata:
        name: applicationsets.argoproj.io
        annotations:
          argocd.argoproj.io/sync-options: ServerSideApply=true
  - patch: |
      apiVersion: apiextensions.k8s.io/v1
      kind: CustomResourceDefinition
      metadata:
        name: appprojects.argoproj.io
        annotations:
          argocd.argoproj.io/sync-options: ServerSideApply=true

  # 4. Preserve our live configuration, merged onto the upstream (empty) ConfigMaps.
  - path: argocd-cm.yaml
  - path: argocd-cmd-params-cm.yaml
