external-secrets:
  crds:
    # The clustersecretstores/secretstores CRD schemas are large enough that
    # client-side apply's last-applied-configuration annotation exceeds the
    # 262144-byte limit. Apply just the CRDs server-side; everything else
    # stays on client-side apply (server-side apply on the Deployments and
    # webhooks produces spurious permanent OutOfSync diffs).
    annotations:
      argocd.argoproj.io/sync-options: ServerSideApply=true
  # Requests anchored to observed usage (controller ~46Mi, webhook ~33Mi,
  # cert-controller ~80Mi) so the scheduler accounts for what these already use.
  resources:
    requests:
      cpu: 10m
      memory: 96Mi
    limits:
      cpu: 100m
      memory: 192Mi
  webhook:
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi
  certController:
    resources:
      requests:
        cpu: 10m
        memory: 128Mi
      limits:
        cpu: 100m
        memory: 192Mi
