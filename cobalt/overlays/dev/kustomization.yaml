apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base
- namespace.yaml
- configmap.yaml
patches:
- path: ingress-patch.yaml
  target:
    kind: Ingress
    name: cobalt-ingress
- path: ingress-inline-patch.yaml
  target:
    kind: Ingress
    name: cobalt-inline-ingress
- path: certificate-patch.yaml
  target:
    kind: Certificate
    name: cobalt-tls
images:
- name: vatusa/cobalt
  newName: vatusa/cobalt
  newTag: aa91dd16834667abb1e0addb5f5dbf4d5c32c6b2
