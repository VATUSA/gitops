apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base
- namespace.yaml
- configmap.yaml
patches:
- path: ingress-patch.yaml
  target:
    kind: Ingress
    name: cobalt-ingress
- path: ingress-inline-patch.yaml
  target:
    kind: Ingress
    name: cobalt-inline-ingress
- path: certificate-patch.yaml
  target:
    kind: Certificate
    name: cobalt-tls
images:
- name: vatusa/cobalt
  newName: vatusa/cobalt
  newTag: 7e85f2bc392fde563340dcfbce46a51cf0f6486e
