# Read-only credential for an external host (droplet/Pi) to poll
# `kubectl top pods -A` for resource-usage logging. Scoped to list/get on
# pods, nodes, and their metrics only — no read access to secrets/configmaps,
# no write access to anything.
apiVersion: v1
kind: Namespace
metadata:
  name: metrics-reader
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-metrics-reader
  namespace: metrics-reader
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: external-metrics-reader
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: external-metrics-reader
subjects:
  - kind: ServiceAccount
    name: external-metrics-reader
    namespace: metrics-reader
roleRef:
  kind: ClusterRole
  name: external-metrics-reader
  apiGroup: rbac.authorization.k8s.io
