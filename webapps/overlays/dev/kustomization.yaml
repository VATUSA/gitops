    kind: Deployment
    name: staff
images:
- name: vatusa/portal
  newName: vatusa/portal
  newTag: ba853d2489577452c7d88c0fd744ec739eafbf52
- name: vatusa/staff
  newName: vatusa/staff
  newTag: 4c4ffc337854a1b37579de193e553c4f6be653e6
