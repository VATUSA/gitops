apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: www-secrets-es
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: eso-bao
    kind: SecretStore
  target:
    name: www-secrets
  dataFrom:
    - extract:
        key: legacy/dev/db
    - extract:
        key: legacy/dev/laravel
    - extract:
        key: legacy/dev/redis
    - extract:
        key: legacy/dev/cobalt