apiVersion: apps/v1
kind: Deployment
metadata:
  name: portal
  labels:
    app: portal
spec:
  replicas: 2
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: portal
  template:
    metadata:
      name: portal
      labels:
        app: portal
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - portal
                topologyKey: kubernetes.io/hostname
      containers:
        - name: portal
          image: vatusa/portal
          imagePullPolicy: Always
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          ports:
            - containerPort: 80
          envFrom:
            - secretRef:
                name: portal-secrets
            - configMapRef:
                name: portal-config
      restartPolicy: Always
