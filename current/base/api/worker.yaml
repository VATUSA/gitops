apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-worker
  labels:
    app: api-worker
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: api-worker
  template:
    metadata:
      name: api-worker
      labels:
        app: api-worker
    spec:
      containers:
        - name: api-worker
          image: vatusa/api
          imagePullPolicy: IfNotPresent
          # Run schedule:work under tini (PID 1) so the per-minute forked
          # scheduler tasks get reaped instead of piling up as zombies. Requires
          # the vatusa/api image to ship /sbin/tini (api repo PR #110) — do NOT
          # merge/sync this until that image is built and deployed, or pods on
          # the old image crashloop on the missing binary.
          command:
            - /sbin/tini
            - -g
            - --
            - php
          args:
            - artisan
            - schedule:work
          resources:
            requests:
              cpu: 15m
              memory: 250Mi
            limits:
              cpu: 1000m
              memory: 2000Mi
          envFrom:
            - secretRef:
                name: api-secrets
            - configMapRef:
                name: api-config
      restartPolicy: Always
