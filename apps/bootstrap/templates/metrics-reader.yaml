apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: metrics-reader
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: metrics-reader
    server: https://kubernetes.default.svc
  project: default
  source:
    path: apps/metrics-reader
    repoURL: https://github.com/vatusa/gitops
    targetRevision: HEAD
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
